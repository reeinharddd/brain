name: Guardian

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  guardian:
    runs-on: ubuntu-latest
    env:
      BRAIN_DIR: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run guardian in PR mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            RANGE="HEAD~1...HEAD"
          fi

          bash "$BRAIN_DIR/guardian/run.sh" --diff-range "$RANGE" --pr-mode --threshold critical
