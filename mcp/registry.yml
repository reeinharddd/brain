mcps:

  memory:
    package: "@modelcontextprotocol/server-memory"
    required: true
    profile: [minimal, standard, full]
    purpose: Persistent in-session and cross-session memory via knowledge graph
    when_to_use: always - provides the memory layer for all agents
    setup: |
      # No install needed - runs via npx
      npx -y @modelcontextprotocol/server-memory
    notes: Official MCP memory server. Stores entities and relations in a local JSON file.

  filesystem:
    package: "@modelcontextprotocol/server-filesystem"
    required: false
    profile: [minimal, standard, full]
    purpose: Structured file system operations with explicit path scoping
    when_to_use: when agents need structured FS access beyond basic Read/Write tools
    setup: "npx -y @modelcontextprotocol/server-filesystem [allowed-dirs]"

  context7:
    package: "@upstash/context7-mcp"
    required: false
    profile: [standard, full]
    purpose: Real-time, up-to-date library documentation retrieval
    when_to_use: when working with third-party libraries (avoids hallucinated docs)
    setup: "npx -y @upstash/context7-mcp"
    notes: Dramatically improves accuracy for library-specific work.

  sequential-thinking:
    package: "@modelcontextprotocol/server-sequential-thinking"
    required: false
    profile: [standard, full]
    purpose: Structured step-by-step reasoning for complex problems
    when_to_use: architectural decisions, debugging unknown issues, multi-step planning
    setup: "npx -y @modelcontextprotocol/server-sequential-thinking"

  github:
    package: "@modelcontextprotocol/server-github"
    required: false
    profile: [standard, full]
    env_required: [GITHUB_TOKEN]
    purpose: GitHub API operations - PRs, issues, repo management
    when_to_use: when working with GitHub repositories programmatically
    setup: |
      export GITHUB_TOKEN=your_token
      npx -y @modelcontextprotocol/server-github
    notes: Set GITHUB_TOKEN in your shell profile. Never commit it.

  playwright:
    package: "@playwright/mcp"
    required: false
    profile: [full]
    purpose: Browser automation, E2E testing, visual verification, scraping
    when_to_use: frontend testing, capturing UI state, browser-based workflows
    setup: "npx -y @playwright/mcp"
    notes: Heavy - only add to per-project configs, not global.

  postgres:
    package: "@modelcontextprotocol/server-postgres"
    required: false
    profile: [full]
    env_required: [DATABASE_URL]
    purpose: Direct database queries for schema inspection and data operations
    when_to_use: database-heavy projects (configure per-project, not globally)
    setup: |
      export DATABASE_URL=postgresql://user:pass@host/db
      npx -y @modelcontextprotocol/server-postgres
    notes: NEVER configure globally. Always per-project. Limit to read-only if possible.

  slack:
    package: "@modelcontextprotocol/server-slack"
    required: false
    profile: [full]
    env_required: [SLACK_BOT_TOKEN]
    purpose: Send messages, create channels, read history for team coordination
    when_to_use: when coordination or notification via Slack is needed
    setup: "export SLACK_BOT_TOKEN=... && npx -y @modelcontextprotocol/server-slack"

  linear:
    package: "@linear/mcp-server"
    required: false
    profile: [full]
    env_required: [LINEAR_API_KEY]
    purpose: Linear issue tracking integration
    when_to_use: when managing project issues, sprints, or roadmap in Linear
    setup: "export LINEAR_API_KEY=... && npx -y @linear/mcp-server"

  brain-rules:
    command: "python3"
    args: ["${HOME}/.brain/mcp/brain-mcp-server/server.py"]
    required: false
    profile: [standard, full]
    purpose: Exposes brain repo internals as queryable tools - rules, agents, task routing, provider selection
    when_to_use: always - gives agents live access to brain rules and routing logic without reading files
    setup: |
      # No install needed - runs with system python3
      python3 ~/.brain/mcp/brain-mcp-server/server.py
    notes: Custom brain MCP server. Gives any MCP-compatible IDE direct tool access to canonical rules and agent routing.

  mem0:
    package: "mem0ai/mem0-mcp"
    required: false
    profile: [standard, full]
    env_required: [MEM0_API_KEY]
    purpose: Managed cross-device memory with semantic search - replaces local MCP memory server
    when_to_use: when MEM0_API_KEY is set - gives cloud-synced memory that works on any device
    setup: |
      export MEM0_API_KEY=m0-...
      npx -y mem0ai/mem0-mcp
    notes: |
      Best option for cross-device memory. Free tier at https://app.mem0.ai
      When configured, use mem0 MCP tools instead of local @modelcontextprotocol/server-memory.
      Tools: mem0_add_memory, mem0_search_memory, mem0_get_all_memories

  upstash-vector:
    package: "@upstash/vector-mcp"
    required: false
    profile: [full]
    env_required: [UPSTASH_VECTOR_URL, UPSTASH_VECTOR_TOKEN]
    purpose: Serverless vector search for semantic memory retrieval
    when_to_use: when UPSTASH_VECTOR_URL is set - alternative to local Qdrant
    setup: |
      export UPSTASH_VECTOR_URL=https://xxx.upstash.io
      export UPSTASH_VECTOR_TOKEN=your-token
      npx -y @upstash/vector-mcp
    notes: Free 10k vectors at https://console.upstash.com -> Vector
