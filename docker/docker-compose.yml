# ===========================================================
#  brain/docker/docker-compose.yml
#
#  Persistent helper services only.
#  Core MCP servers run more reliably in stdio or on-demand mode
#  from the generated adapter settings, instead of behind SSE bridges.
# ===========================================================

name: brain-persistent-helpers

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
    name: brain-qdrant-data
    external: true
