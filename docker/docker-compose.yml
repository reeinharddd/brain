# ═══════════════════════════════════════════════════════════
#  brain/docker/docker-compose.yml
#
#  MCP Stack — all servers run as persistent SSE services
#  via supergateway (stdio → HTTP bridge)
# ═══════════════════════════════════════════════════════════

name: brain-mcp-stack

services:

  # ── Memory MCP ─────────────────────────────────────────────
  mcp-memory:
    image: node:20-alpine
    container_name: brain-mcp-memory
    restart: unless-stopped
    command: >
      npx -y supergateway 
      --stdio "npx -y @modelcontextprotocol/server-memory" 
      --port 8000 --host 0.0.0.0
    ports:
      - "${MCP_MEMORY_PORT:-3001}:8000"
    volumes:
      - mcp_memory_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Filesystem MCP ─────────────────────────────────────────
  mcp-filesystem:
    image: node:20-alpine
    container_name: brain-mcp-filesystem
    restart: unless-stopped
    command: >
      npx -y supergateway 
      --stdio "npx -y @modelcontextprotocol/server-filesystem /workspace" 
      --port 8000 --host 0.0.0.0
    ports:
      - "${MCP_FILESYSTEM_PORT:-3002}:8000"
    volumes:
      - ${HOST_HOME:-~}:/workspace
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Sequential Thinking MCP ────────────────────────────────
  mcp-sequential-thinking:
    image: node:20-alpine
    container_name: brain-mcp-sequential
    restart: unless-stopped
    command: >
      npx -y supergateway 
      --stdio "npx -y @modelcontextprotocol/server-sequential-thinking" 
      --port 8000 --host 0.0.0.0
    ports:
      - "${MCP_SEQUENTIAL_PORT:-3003}:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Context7 MCP ───────────────────────────────────────────
  mcp-context7:
    image: node:20-alpine
    container_name: brain-mcp-context7
    restart: unless-stopped
    command: >
      npx -y supergateway 
      --stdio "npx -y @upstash/context7-mcp@latest" 
      --port 8000 --host 0.0.0.0
    ports:
      - "${MCP_CONTEXT7_PORT:-3005}:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── GitHub MCP ─────────────────────────────────────────────
  mcp-github:
    image: node:20-alpine
    container_name: brain-mcp-github
    profiles: [github]
    restart: unless-stopped
    command: >
      npx -y supergateway 
      --stdio "npx -y @modelcontextprotocol/server-github" 
      --port 8000 --host 0.0.0.0
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "${MCP_GITHUB_PORT:-3004}:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mcp_memory_data:
    name: brain-mcp-memory-data
